version: '3.8'

services:
  backend:
    build:
      context: ./ai-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - backend-images:/app/generated_images
      - backend-chroma:/app/chroma_db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - AI_BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_AI_BACKEND_URL=${NEXT_PUBLIC_AI_BACKEND_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: always

volumes:
  backend-images:
  backend-chroma:
